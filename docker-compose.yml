version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./vegan_recipes.csv:/app/vegan_recipes.csv
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - veg-vibe-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - veg-vibe-net

networks:
  veg-vibe-net:
    driver: bridge
